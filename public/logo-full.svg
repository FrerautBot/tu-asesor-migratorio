<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <style>
      .wordmark-light { font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 18px; font-weight: 400; fill: #0F2440; letter-spacing: 3px; }
      .wordmark-bold  { font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #0F2440; }
    </style>
  </defs>

  <!-- Brújula centrada a la izquierda -->
  <g transform="translate(58, 60)">
    <!-- Círculo exterior -->
    <circle cx="0" cy="0" r="36" stroke="#0F2440" stroke-width="2.8" fill="none" />

    <!-- Flecha Norte — asta -->
    <rect x="-5" y="-22" width="10" height="18" rx="2" fill="#C17A4E" />
    <!-- Flecha Norte — punta -->
    <polygon points="-16,-11 0,-29 16,-11" fill="#C17A4E" />

    <!-- N dibujada como vector (no texto) para consistencia perfecta -->
    <g transform="translate(0, -35)" fill="#0F2440">
      <rect x="-4.5" y="-6" width="3" height="10" rx="0.5" />
      <rect x="1.5" y="-6" width="3" height="10" rx="0.5" />
      <polygon points="-4.5,-6 -4.5,-4 4.5,5 4.5,3 -2,-6" />
    </g>

    <!-- Este -->
    <line x1="7" y1="0" x2="33" y2="0" stroke="#0F2440" stroke-width="2.2" stroke-linecap="round" />
    <circle cx="33.5" cy="0" r="2.8" fill="#0F2440" />
    <!-- Oeste -->
    <line x1="-7" y1="0" x2="-33" y2="0" stroke="#0F2440" stroke-width="2.2" stroke-linecap="round" />
    <circle cx="-33.5" cy="0" r="2.8" fill="#0F2440" />
    <!-- Sur -->
    <line x1="0" y1="7" x2="0" y2="33" stroke="#0F2440" stroke-width="2.2" stroke-linecap="round" />
    <circle cx="0" cy="33.5" r="2.8" fill="#0F2440" />

    <!-- Centro -->
    <circle cx="0" cy="0" r="3.2" fill="#C17A4E" />
  </g>

  <!-- Wordmark -->
  <g transform="translate(125, 60)">
    <text x="0" y="-13" class="wordmark-light">TU ASESOR</text>
    <text x="0" y="20" class="wordmark-bold">MIGRATORIO</text>
    <!-- Línea separadora terracota -->
    <line x1="0" y1="-3" x2="245" y2="-3" stroke="#C17A4E" stroke-width="1.2" stroke-linecap="round" />
  </g>
</svg>
